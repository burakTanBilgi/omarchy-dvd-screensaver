<body>
  <canvas id="fx"></canvas>
  <div id="logo"></div>
<script>
(() => {
  const logo = document.getElementById('logo');
  const fx   = document.getElementById('fx');
  const ctx  = fx.getContext('2d');

  const colors = [
    '#ff2a6d', '#05d9e8', '#d1f7ff', '#ff9f1c',
    '#7cfc00', '#e000ff', '#ffd700', '#00ffd5'
  ];
  let cidx = 0;
  const W = () => window.innerWidth;
  const H = () => window.innerHeight;
  const rand = (a, b) => a + Math.random() * (b - a);

  // ---------- fireworks canvas (DPR-aware) ----------
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    fx.width  = Math.floor(W() * dpr);
    fx.height = Math.floor(H() * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  const GRAV = 0.06;
  let shells = [], sparks = [], pending = [];
  let nowMs = 0, lastCorner = -1e9;

  // ---- ground pile: embers settle into a glowing mound along the floor ----
  let pile = [], pileTop = null;
  const BUCKET = 10;                                   // px width of a pile column
  function resetPile() {
    pile.length = 0;
    pileTop = new Float32Array(Math.ceil((W() + BUCKET) / BUCKET));
  }
  resetPile();
  const FLOOR_OFFSET = 8;                               // pile sits a few px up from the very edge
  function depositEmber(x, color) {
    if (!pileTop) resetPile();
    const L = pileTop.length, cap = H() * 0.5;
    const b = Math.max(0, Math.min(L - 1, (x / BUCKET) | 0));
    const restY = H() - FLOOR_OFFSET - pileTop[b];
    pileTop[b] = Math.min(pileTop[b] + rand(4.5, 7.5), cap);        // taller mounds where embers land
    if (b + 1 < L) pileTop[b + 1] = Math.min(pileTop[b + 1] + 2.2, cap);   // spill -> smooth hill
    if (b - 1 >= 0) pileTop[b - 1] = Math.min(pileTop[b - 1] + 2.2, cap);
    if (b + 2 < L) pileTop[b + 2] = Math.min(pileTop[b + 2] + 0.9, cap);
    if (b - 2 >= 0) pileTop[b - 2] = Math.min(pileTop[b - 2] + 0.9, cap);
    if (pile.length > 2400) pile.shift();
    pile.push({ x, y: restY, color, heat: 1, size: rand(2.6, 3.7) });
  }

  // ---- a generic spark (per-particle gravity / drag / twinkle / ember) ----
  function spark(x, y, vx, vy, life, color, opt) {
    opt = opt || {};
    sparks.push({
      x, y, vx, vy, life, max: life, color,
      size: opt.size != null ? opt.size : rand(1.4, 2.6),
      g:    opt.g    != null ? opt.g    : GRAV,
      drag: opt.drag != null ? opt.drag : 0.985,
      twinkle: opt.twinkle ? 1 : 0,
      ember: (opt.ember && Math.random() < opt.ember) ? 1 : 0,
    });
  }

  // ---- effect types: one is chosen at random per burst, each self-randomized ----
  function fxChrys(x, y, color, big) {                 // radial chrysanthemum (the classic)
    const n = (big ? 78 : 46) + (Math.random() * 30 | 0);
    const base = big ? rand(3.6, 6.4) : rand(2.0, 4.4);
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + rand(-0.05, 0.05), sp = rand(0.55, 1) * base;
      spark(x, y, Math.cos(a) * sp, Math.sin(a) * sp, rand(50, big ? 118 : 92), color,
            { size: rand(1.4, big ? 3.2 : 2.6), ember: 0.5 });
    }
  }
  function fxWillow(x, y, color, big) {                // droopy gold fronds raining down
    const gold = Math.random() < 0.6 ? '#ffd35e' : color;
    const n = (big ? 60 : 40) + (Math.random() * 20 | 0);
    const base = big ? rand(3.4, 5.2) : rand(2.4, 4.0);
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + rand(-0.05, 0.05), sp = rand(0.5, 1) * base;
      spark(x, y, Math.cos(a) * sp, Math.sin(a) * sp - rand(0, 1.2), rand(150, 240), gold,
            { size: rand(1.4, 2.4), g: 0.05, drag: 0.993, ember: 0.95 });
    }
  }
  function fxPalm(x, y, color, big) {                  // the SLOW one — fronds rise gently, hang, then droop
    const n = 7 + (Math.random() * 4 | 0), base = big ? rand(3.4, 4.8) : rand(2.6, 4.0), tilt = rand(-0.5, 0.5);
    for (let i = 0; i < n; i++) {
      const a = -Math.PI / 2 + tilt + (i / (n - 1) - 0.5) * 2.1;    // upward fan
      // long life + low gravity => palm lingers ~2s past the other effects (~7s vs ~5s)
      spark(x, y, Math.cos(a) * base, Math.sin(a) * base, rand(210, 330), color,
            { size: rand(2.4, 3.6), g: 0.04, drag: 0.993, ember: 0.92 });
    }
    for (let i = 0; i < 14; i++) {                     // bright core
      const a = Math.random() * Math.PI * 2;
      spark(x, y, Math.cos(a) * rand(0.5, 2), Math.sin(a) * rand(0.5, 2), rand(30, 55), '#fff3c0', { size: rand(1.4, 2.4) });
    }
  }
  function fxRing(x, y, color, big) {                  // a clean flat expanding ring
    const n = 46 + (Math.random() * 20 | 0), sp = big ? rand(4.2, 5.6) : rand(3.0, 4.4), tilt = rand(0.55, 1);
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;                 // SAME speed -> a ring; tilt squashes it
      spark(x, y, Math.cos(a) * sp, Math.sin(a) * sp * tilt, rand(46, 72), color,
            { size: rand(1.6, 2.4), g: 0.012, drag: 0.995, ember: 0.3 });
    }
  }
  function fxCrackle(x, y, color, big) {               // twinkling / strobing cloud
    const n = (big ? 90 : 60) + (Math.random() * 30 | 0), base = big ? rand(2.6, 4.4) : rand(1.8, 3.4);
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2, sp = Math.random() * base;
      const c = Math.random() < 0.5 ? '#ffffff' : (Math.random() < 0.5 ? color : '#ffe066');
      spark(x, y, Math.cos(a) * sp, Math.sin(a) * sp, rand(40, 80), c,
            { size: rand(1.2, 2.2), twinkle: 1, ember: 0.4 });
    }
  }
  function fxMulti(x, y, color, big) {                 // splits into secondary bursts
    fxChrys(x, y, color, false);                       // primary
    const k = 3 + (Math.random() * 2 | 0);
    for (let i = 0; i < k; i++) {
      const a = Math.random() * Math.PI * 2, d = rand(40, 120);
      pending.push({ x: x + Math.cos(a) * d, y: y + Math.sin(a) * d,
                     delay: 8 + (Math.random() * 18 | 0), color: colors[(Math.random() * colors.length) | 0] });
    }
  }

  const EFFECTS = [fxChrys, fxWillow, fxPalm, fxRing, fxCrackle, fxMulti];
  function detonate(x, y, color, big) {
    EFFECTS[(Math.random() * EFFECTS.length) | 0](x, y, color, big);
    // guaranteed fallout: heavy, long-lived embers (slight downward bias) that
    // reliably reach the floor and accumulate into the ground pile.
    const f = big ? 32 : 20;
    for (let i = 0; i < f; i++) {
      const a = Math.random() * Math.PI * 2, sp = Math.random() * 2.2;
      spark(x, y, Math.cos(a) * sp, Math.sin(a) * sp + rand(0.5, 2.0), rand(150, 250), color,
            { size: rand(1.8, 2.8), g: 0.08, drag: 0.99, ember: 1 });
    }
  }

  // A shell rises from the corner along an arc to an ON-SCREEN target, where it
  // detonates — so a burst is never lost past an edge.
  function makeShell(x0, y0, tx, ty, dur, big) {
    const cx = (x0 + tx) / 2 + rand(-60, 60);           // bezier control point...
    const cy = Math.min(y0, ty) - rand(90, 240);         // ...lifted up for the arc
    return { x0, y0, cx, cy, tx, ty, x: x0, y: y0, t: 0, dur, big,
             color: colors[(Math.random() * colors.length) | 0] };
  }

  // One volley = several shells, each detonating at its own random on-screen
  // point. Counts / positions / sizes are all randomized, so no two shows match.
  function launchVolley(cx, cy, finale) {
    const n = finale ? 5 + (Math.random() * 3 | 0) : 2 + (Math.random() * 4 | 0);
    const M = 72;                                        // keep bursts off the edge
    for (let i = 0; i < n; i++) {
      const tx  = rand(M, W() - M);
      const ty  = rand(H() * 0.12, H() * 0.60);          // upper-middle, always visible
      const dur = Math.floor(rand(26, 50));              // frames to reach target
      const big = finale || Math.random() < 0.28;        // some are large bursts
      shells.push(makeShell(cx, cy, tx, ty, dur, big));
    }
  }

  function stepFx() {
    // translucent black = fading trails
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(0,0,0,0.20)';
    ctx.fillRect(0, 0, W(), H());
    ctx.globalCompositeOperation = 'lighter';   // additive glow

    // delayed secondary bursts (multi-break)
    for (let i = pending.length - 1; i >= 0; i--) {
      if (--pending[i].delay <= 0) { fxChrys(pending[i].x, pending[i].y, pending[i].color, false); pending.splice(i, 1); }
    }

    // rising shells -> detonate into a random effect at their on-screen target
    for (let i = shells.length - 1; i >= 0; i--) {
      const s = shells[i];
      s.t += 1 / s.dur;
      const u = 1 - s.t;                                 // quadratic bezier along arc
      s.x = u * u * s.x0 + 2 * u * s.t * s.cx + s.t * s.t * s.tx;
      s.y = u * u * s.y0 + 2 * u * s.t * s.cy + s.t * s.t * s.ty;
      ctx.globalAlpha = 1; ctx.fillStyle = s.color;
      ctx.beginPath(); ctx.arc(s.x, s.y, 2.2, 0, 7); ctx.fill();
      if (s.t >= 1) { detonate(s.tx, s.ty, s.color, s.big); shells.splice(i, 1); }
    }

    // sparks: per-particle physics; embers that reach the floor settle into the pile
    const floor = H() - FLOOR_OFFSET;
    for (let i = sparks.length - 1; i >= 0; i--) {
      const p = sparks[i];
      p.vy += p.g; p.vx *= p.drag; p.x += p.vx; p.y += p.vy; p.life--;
      if (p.life <= 0) { sparks.splice(i, 1); continue; }
      if (p.ember && p.y >= floor) { depositEmber(p.x, p.color); sparks.splice(i, 1); continue; }
      let al = Math.max(0, p.life / p.max);
      if (p.twinkle) al *= 0.35 + Math.random() * 0.65;
      ctx.globalAlpha = al; ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, 7); ctx.fill();
    }

    // the settled pile, redrawn each frame; embers cool white -> warm -> ember-red
    for (let i = pile.length - 1; i >= 0; i--) {
      const e = pile[i];
      e.heat *= 0.996;                                   // cools slowly over the show
      if (e.heat < 0.04) { pile.splice(i, 1); continue; }
      ctx.globalAlpha = Math.min(1, e.heat + 0.32);      // stays bright so it's clearly visible
      ctx.fillStyle = e.heat > 0.7 ? '#fff1c0' : (e.heat > 0.38 ? e.color : '#ff7a3a');
      ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
  }

  // A ~5s show: volleys staggered over ~4s (sparks linger ~1s more), ending on a
  // bigger finale. Timing is jittered so the rhythm differs every time.
  function fireShow(cx, cy) {
    const times = [0, 520, 1080, 1700, 2380, 3080, 3820];   // launches over ~4s
    times.forEach((tm, idx) => {
      const finale = idx === times.length - 1;
      setTimeout(() => launchVolley(cx, cy, finale), Math.max(0, tm + rand(-130, 130)));
    });
  }

  // The legendary corner hit: the fireworks show + a logo flash.
  function cornerCelebrate(cx, cy) {
    if (nowMs - lastCorner < 6000) return;   // cooldown spans the whole show
    lastCorner = nowMs;
    resetPile();
    fireShow(cx, cy);
    logo.style.transition = 'color 0ms, filter 0ms';
    logo.style.filter = 'drop-shadow(0 0 48px currentColor) drop-shadow(0 0 20px #fff)';
    setTimeout(() => {
      logo.style.transition = 'color 80ms linear, filter 80ms linear';
      logo.style.filter = 'drop-shadow(0 0 14px currentColor)';
    }, 360);
  }

  // ---------- bouncing logo ----------
  let lw = logo.offsetWidth, lh = logo.offsetHeight;
  let x = Math.random() * Math.max(1, W() - lw);
  let y = Math.random() * Math.max(1, H() - lh);
  const speed = 2.2;
  let dx = Math.random() < 0.5 ? -speed : speed;
  let dy = Math.random() < 0.5 ? -speed : speed;

  // How close (px) to a corner still counts as a corner hit. A true corner is
  // essentially never; bump this up to make the fireworks fire more often.
  const CORNER_TOL = 8;

  const setColor = i => { cidx = (i + colors.length) % colors.length; logo.style.color = colors[cidx]; };
  setColor(Math.random() * colors.length | 0);

  function tick(t) {
    nowMs = t;
    lw = logo.offsetWidth; lh = logo.offsetHeight;
    const w = W(), h = H();

    x += dx; y += dy;
    let hit = false;
    if (x <= 0)        { x = 0;        dx = -dx; hit = true; }
    if (x + lw >= w)   { x = w - lw;   dx = -dx; hit = true; }
    if (y <= 0)        { y = 0;        dy = -dy; hit = true; }
    if (y + lh >= h)   { y = h - lh;   dy = -dy; hit = true; }

    if (hit) {
      let next = cidx; while (next === cidx) next = Math.random() * colors.length | 0;
      setColor(next);
      const atL = x <= CORNER_TOL, atR = x + lw >= w - CORNER_TOL;
      const atT = y <= CORNER_TOL, atB = y + lh >= h - CORNER_TOL;
      if ((atL || atR) && (atT || atB)) {
        cornerCelebrate(atL ? 0 : w, atT ? 0 : h);
      }
    }

    logo.style.transform = `translate(${x}px, ${y}px)`;
    stepFx();
    requestAnimationFrame(tick);
  }

  // ?demo=1 — LOOP the corner show so you can actually watch it (fireworks +
  // ground pile), firing from a random corner each time. Press Esc or q to quit;
  // mouse moves are ignored in this mode so it doesn't close while you watch.
  const DEMO = location.search.indexOf('demo') >= 0;
  if (DEMO) {
    const fire = () => {
      const c = [[0, 0], [W(), 0], [0, H()], [W(), H()]][(Math.random() * 4) | 0];
      cornerCelebrate(c[0], c[1]);
    };
    setTimeout(fire, 200);
    setInterval(fire, 8500);                 // re-fire after each show (> the 6s cooldown)
    addEventListener('keydown', e => {
      if (e.key === 'Escape' || e.key === 'q') { try { window.close(); } catch (_) {} }
    });
  }

  // Exit on ANY input (after a grace period so the cursor move during window
  // creation doesn't immediately close us). Skipped in ?demo mode so you can
  // sit and watch the show.
  if (!DEMO) {
    const exit = () => { try { window.close(); } catch (e) {} };
    setTimeout(() => {
      ['keydown', 'mousemove', 'mousedown', 'wheel', 'touchstart'].forEach(ev =>
        window.addEventListener(ev, exit, { once: true, passive: true }));
    }, 1500);
  }

  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
